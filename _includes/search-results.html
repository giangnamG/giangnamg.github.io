<div id="search-result-wrapper" class="d-none d-flex justify-content-center">
  <div class="col-12 col-lg-11 col-xl-9 px-md-4">
    <div class="content">
      <style>
        #search-results {
          display: grid !important;
          grid-template-columns: minmax(0, 1fr);
          align-items: stretch;
          row-gap: 1.5rem;
          width: 100%;
          margin-top: 1rem;
          padding: 0;
        }

        #search-results .site-search-result {
          display: block;
          grid-column: 1;
          justify-self: stretch;
          align-self: stretch;
          flex: none;
          width: 100%;
          max-width: 100%;
          box-sizing: border-box;
          margin: 0;
          padding: 0 !important;
        }

        #search-results .site-search-result-link {
          display: grid;
          grid-template-columns: minmax(0, 1fr);
          grid-template-areas:
            'title'
            'meta'
            'snippet';
          grid-template-rows: minmax(calc(1.35em * 2), auto) minmax(1.8rem, auto) auto;
          align-items: start;
          gap: 0.65rem;
          padding: 1.05rem 1.1rem 1.1rem;
          border: 1px solid var(--main-border-color);
          border-radius: 1rem;
          background: color-mix(in srgb, var(--card-bg, var(--main-bg)) 84%, transparent);
          text-decoration: none;
          font-size: inherit !important;
          width: 100%;
          max-width: 100%;
          box-sizing: border-box;
          transition: border-color 160ms ease, transform 160ms ease, box-shadow 160ms ease;
        }

        #search-results .site-search-result-link:hover {
          border-color: var(--link-color);
          transform: translateY(-1px);
          box-shadow: 0 0.8rem 1.8rem rgba(0, 0, 0, 0.12);
        }

        #search-results .site-search-result-link > header {
          grid-area: title;
          margin: 0;
          min-width: 0;
        }

        #search-results .site-search-result-link > * {
          min-width: 0;
        }

        #search-results .site-search-result-title {
          margin: 0;
          color: var(--heading-color);
          font-size: 1.45rem;
          line-height: 1.35;
          min-height: calc(1.35em * 2);
          display: -webkit-box;
          -webkit-line-clamp: 2;
          -webkit-box-orient: vertical;
          overflow: hidden;
        }

        #search-results .post-meta {
          grid-area: meta;
          align-items: flex-start;
          flex-wrap: wrap;
          column-gap: 1rem;
          row-gap: 0.25rem;
          min-height: 1.8rem;
          margin: 0 !important;
        }

        #search-results .site-search-result-snippet {
          grid-area: snippet;
          color: var(--text-muted-color);
          white-space: normal;
          line-height: 1.6;
          max-width: 100%;
          display: -webkit-box;
          -webkit-line-clamp: 4;
          -webkit-box-orient: vertical;
          overflow: hidden;
          margin: 0;
        }

        .site-search-target {
          scroll-margin-top: 6rem;
          border-left: 3px solid var(--link-color);
          padding-left: 0.9rem;
          margin-left: -1rem;
          border-radius: 0.75rem;
          background: color-mix(in srgb, var(--link-color) 10%, transparent);
        }

        mark.site-search-hit {
          background: #ffe66d;
          color: #111;
          border-radius: 0.2rem;
          padding: 0 0.12rem;
        }

        @media (max-width: 849px) {
          #search-results .site-search-result-link {
            padding: 0.95rem 0.95rem;
            grid-template-rows: minmax(calc(1.32em * 2), auto) minmax(2rem, auto) auto;
          }

          #search-results .site-search-result-title {
            font-size: 1.2rem;
            min-height: calc(1.32em * 2);
          }

          #search-results .post-meta {
            min-height: 2rem;
          }
        }
      </style>
      <div id="search-hints" class="text-muted mt-3">
        {% if site.site_protection.enabled %}
          <p class="mb-0">Search is available after the site is unlocked. Results match full text across posts and pages.</p>
        {% else %}
          <p class="mb-0">Type in the search box to find matching content.</p>
        {% endif %}
      </div>

      <div id="search-results"></div>
    </div>
  </div>
</div>
