{% unless site.site_protection.enabled %}
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      SimpleJekyllSearch({
        searchInput: document.getElementById('search-input'),
        resultsContainer: document.getElementById('search-results'),
        json: '{{ "/assets/js/data/search.json" | relative_url }}',
        searchResultTemplate:
          '<article class="px-1 px-sm-2 px-lg-4 px-xl-0"><header><h2><a href="{url}">{title}</a></h2><div class="post-meta d-flex flex-column flex-sm-row text-muted mt-1 mb-1">{categories} {tags}</div></header><p>{content}</p></article>',
        noResultsText: '<p class="mt-5">Oops! No results found.</p>',
        templateMiddleware(prop, value) {
          if (prop === 'categories') {
            return value === '' ? value : `<div class="me-sm-4"><i class="far fa-folder fa-fw"></i>${value}</div>`;
          }

          if (prop === 'tags') {
            return value === '' ? value : `<div><i class="fa fa-tag fa-fw"></i>${value}</div>`;
          }
        }
      });
    });
  </script>
{% endunless %}
