{% include toc-status.html %}

{% if enable_toc %}
  <div class="toc-border-cover z-3"></div>
  <section id="toc-wrapper" class="invisible position-sticky ps-0 pe-4 pb-4">
    <h2 class="panel-heading ps-3 pb-2 mb-0">{{- site.data.locales[include.lang].panel.toc -}}</h2>
    <nav id="toc"></nav>
  </section>

  <script>
    const initializeChirpyToc = () => {
      const content = document.querySelector('main article .content');
      const toc = document.getElementById('toc');
      const popupToc = document.getElementById('toc-popup-content');
      const tocWrapper = document.getElementById('toc-wrapper');

      if (!content || !toc || !tocWrapper) {
        return;
      }

      const slugify = (value) =>
        value
          .toLowerCase()
          .trim()
          .replace(/[^\p{L}\p{N}\s-]/gu, '')
          .replace(/\s+/g, '-')
          .replace(/-+/g, '-');

      const assignedIds = new Set();
      const linksByHeadingId = new Map();

      const buildUniqueHeadingId = (heading, fallbackIndex) => {
        const baseId = slugify(heading.textContent.trim()) || `section-${fallbackIndex + 1}`;
        let nextId = baseId;
        let suffix = 2;

        while (assignedIds.has(nextId) || document.getElementById(nextId)) {
          if (heading.id === nextId) {
            break;
          }

          nextId = `${baseId}-${suffix}`;
          suffix += 1;
        }

        assignedIds.add(nextId);
        return nextId;
      };

      const headings = Array.from(content.querySelectorAll('h1, h2, h3, h4')).filter((heading, index) => {
        if (heading.hasAttribute('data-toc-skip')) {
          return false;
        }

        const text = heading.textContent.trim();
        if (!text) {
          return false;
        }

        heading.id = buildUniqueHeadingId(heading, index);

        return true;
      });

      if (!headings.length) {
        toc.replaceChildren();
        if (popupToc) {
          popupToc.replaceChildren();
        }
        tocWrapper.classList.add('invisible');
        return;
      }

      const buildTocTree = () => {
        const root = document.createElement('ul');
        const stack = [{ level: 0, list: root }];

        headings.forEach((heading, index) => {
          const level = Number.parseInt(heading.tagName.slice(1), 10);

          while (stack.length > 1 && level <= stack[stack.length - 1].level) {
            stack.pop();
          }

          const item = document.createElement('li');
          if (index === 0) {
            item.classList.add('is-active-li');
          }

          const link = document.createElement('a');
          link.href = `#${heading.id}`;
          link.textContent = heading.textContent.trim();
          link.classList.add('toc-link');

          if (!linksByHeadingId.has(heading.id)) {
            linksByHeadingId.set(heading.id, []);
          }

          linksByHeadingId.get(heading.id).push(link);

          if (index === 0) {
            link.classList.add('is-active-link');
          }

          item.appendChild(link);

          const children = document.createElement('ul');
          item.appendChild(children);

          stack[stack.length - 1].list.appendChild(item);
          stack.push({ level, list: children });
        });

        root.querySelectorAll('ul').forEach((list) => {
          if (!list.children.length) {
            list.remove();
          }
        });

        return root;
      };

      const tocTree = buildTocTree();
      toc.replaceChildren(tocTree);

      if (popupToc) {
        popupToc.replaceChildren(tocTree.cloneNode(true));
      }

      popupToc?.querySelectorAll('.toc-link').forEach((link) => {
        const hash = link.getAttribute('href') || '';
        const headingId = hash.startsWith('#') ? hash.slice(1) : '';
        if (!headingId) {
          return;
        }

        if (!linksByHeadingId.has(headingId)) {
          linksByHeadingId.set(headingId, []);
        }

        linksByHeadingId.get(headingId).push(link);
      });

      const setActiveHeading = (activeHeadingId) => {
        tocWrapper.querySelectorAll('.is-active-li').forEach((item) => item.classList.remove('is-active-li'));
        tocWrapper.querySelectorAll('.is-active-link').forEach((link) => link.classList.remove('is-active-link'));

        if (!activeHeadingId) {
          return;
        }

        (linksByHeadingId.get(activeHeadingId) || []).forEach((link) => {
          link.classList.add('is-active-link');
          link.closest('li')?.classList.add('is-active-li');
        });
      };

      const resolveActiveHeading = () => {
        const scrollOffset = Math.max(window.innerHeight * 0.16, 110);
        let activeHeading = headings[0];

        for (const heading of headings) {
          if (heading.getBoundingClientRect().top - scrollOffset <= 0) {
            activeHeading = heading;
          } else {
            break;
          }
        }

        return activeHeading;
      };

      let ticking = false;
      const syncActiveHeading = () => {
        ticking = false;
        setActiveHeading(resolveActiveHeading()?.id || headings[0]?.id);
      };

      const requestSyncActiveHeading = () => {
        if (ticking) {
          return;
        }

        ticking = true;
        window.requestAnimationFrame(syncActiveHeading);
      };

      tocWrapper.querySelectorAll('.toc-link').forEach((link) => {
        link.addEventListener('click', () => {
          const hash = link.getAttribute('href') || '';
          const headingId = hash.startsWith('#') ? hash.slice(1) : '';
          if (headingId) {
            setActiveHeading(headingId);
          }
        });
      });

      if (window.__chirpyTocOnScroll) {
        window.removeEventListener('scroll', window.__chirpyTocOnScroll);
      }

      if (window.__chirpyTocOnResize) {
        window.removeEventListener('resize', window.__chirpyTocOnResize);
      }

      if (window.__chirpyTocOnHashChange) {
        window.removeEventListener('hashchange', window.__chirpyTocOnHashChange);
      }

      window.__chirpyTocOnScroll = requestSyncActiveHeading;
      window.__chirpyTocOnResize = requestSyncActiveHeading;
      window.__chirpyTocOnHashChange = () => {
        const hash = window.location.hash || '';
        const headingId = hash.startsWith('#') ? hash.slice(1) : '';

        if (headingId && linksByHeadingId.has(headingId)) {
          setActiveHeading(headingId);
          return;
        }

        requestSyncActiveHeading();
      };

      window.addEventListener('scroll', window.__chirpyTocOnScroll, { passive: true });
      window.addEventListener('resize', window.__chirpyTocOnResize, { passive: true });
      window.addEventListener('hashchange', window.__chirpyTocOnHashChange);

      requestSyncActiveHeading();
      tocWrapper.classList.remove('invisible');
    };

    document.addEventListener('DOMContentLoaded', initializeChirpyToc);
    document.addEventListener('site-protection:unlocked', initializeChirpyToc);
  </script>
{% endif %}
