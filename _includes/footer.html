<footer class="notion-footer d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
  <p class="mb-0">
    <span>{{ site.social.name | default: site.title }}</span>
    <span class="notion-footer__dot"></span>
    <span>{{ 'now' | date: '%Y' }}</span>
  </p>

  <div class="notion-footer__links d-flex flex-wrap gap-3">
    <a href="{{ '/' | relative_url }}">Home</a>
    {% if site.social.links and site.social.links.size > 0 %}
      <a href="{{ site.social.links | first }}" target="_blank" rel="noopener noreferrer">Profile</a>
    {% endif %}
    <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
  </div>
</footer>
